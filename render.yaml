services:
  # Backend Node.js Service
  - type: web
    name: qc-management-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: super_secret_qc_key_2026_render
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: DATABASE_URL
        fromDatabase:
          name: qc-management-db
          property: connectionString

  # Frontend React (Static Site)
  - type: web
    name: qc-management-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: qc-management-backend
          type: web
          property: host

# PostgreSQL Database
databases:
  - name: qc-management-db
    databaseName: qc_db
    user: qc_user
    plan: free
