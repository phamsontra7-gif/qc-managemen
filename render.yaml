services:
  # Backend Node.js Service
  - type: web
    name: qc-management-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: super_secret_qc_key_2026_render
      - key: JWT_EXPIRES_IN
        value: 24h
      # DATABASE_URL is set manually in Render Environment Variables (Supabase)
      # Do NOT add fromDatabase here — the old Render DB has been deleted

  # Frontend React (Static Site)
  - type: web
    name: qc-management-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: qc-management-backend
          type: web
          property: host

